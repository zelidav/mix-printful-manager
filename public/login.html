<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Made in Xiaolin — Printful — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #111; border: 1px solid #333; border-radius: 12px; padding: 36px 32px; width: 380px; text-align: center; }
    .login-box h1 { font-size: 22px; margin-bottom: 6px; }
    .login-box h1 span { color: #d4af37; }
    .login-box p { color: #888; font-size: 13px; margin-bottom: 22px; }
    .login-box input { width: 100%; padding: 12px 16px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: #e0e0e0; font-size: 16px; margin-bottom: 14px; font-family: inherit; }
    .login-box input:focus { outline: none; border-color: #d4af37; }
    .login-box button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #d4af37; color: #1a1a1a; font-size: 15px; font-weight: 700; cursor: pointer; }
    .login-box button:hover { background: #e3c351; }
    .login-box button:disabled { opacity: 0.6; cursor: wait; }
    .error { color: #ff6b6b; font-size: 13px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1><span>Made in Xiaolin</span> · Printful</h1>
    <p>Multi-store merch manager</p>

    <div class="error" id="error"></div>

    <form onsubmit="loginPw(event)">
      <input type="password" id="password" placeholder="Admin password" autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    if (sessionStorage.getItem('auth_token')) {
      window.location.href = '/?token=' + sessionStorage.getItem('auth_token');
    }
    function showErr(msg) {
      const e = document.getElementById('error');
      e.textContent = msg || 'Sign-in failed.';
      e.style.display = 'block';
    }
    async function postLogin(body) {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.success) {
        sessionStorage.setItem('auth_token', data.token);
        window.location.href = '/?token=' + data.token;
      } else {
        showErr(data.error);
      }
    }
    function loginPw(e) {
      e.preventDefault();
      postLogin({ password: document.getElementById('password').value });
    }
  </script>
</body>
</html>
